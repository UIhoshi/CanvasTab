<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanvasTab: 浏览器壁纸与书签整理器</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">
  <!-- 独立壁纸背景图层与层级遮罩，支持透明度自由调节 -->
  <div class="wallpaper-overlay" id="wallpaper-overlay"></div>
  <div class="wallpaper-mask" id="wallpaper-mask"></div>
  <div class="app-container" id="app-container">
    <!-- 侧边栏：显示文件夹目录 -->
    <aside class="sidebar" id="sidebar">
      <!-- 侧边栏折叠切换按钮 -->
      <button class="sidebar-toggle" id="sidebar-toggle" title="折叠/展开侧边栏">
        <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      
      <div class="sidebar-header">
        <span class="logo-text">
          <svg style="width:1.15em;height:1.15em;vertical-align:middle;display:inline-flex;margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="8" x2="22" y2="12"/><line x1="12" y1="2" x2="22" y2="12"/><polyline points="12 2 20 10 12 18"/><line x1="6" y1="12" x2="12" y2="18"/><line x1="2" y1="22" x2="11" y2="13"/></svg>
          书签视觉看板
        </span>
      </div>
      <nav class="folder-list" id="folder-list">
        <div class="loading-placeholder">加载文件夹中...</div>
      </nav>
      <div class="sidebar-footer">
        <span class="version-tag">v1.7 | 幻灯壁纸版</span>
      </div>
    </aside>

    <!-- 主展示区 -->
    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <div style="display: flex; align-items: center; gap: 12px;">
            <!-- 模式切换 -->
            <div class="mode-switcher-container">
              <div class="mode-switcher" id="main-mode-switcher">
                <button class="mode-btn active" data-mode="manage">
                  <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
                  <span class="btn-text">极简管理</span>
                </button>
                <button class="mode-btn" data-mode="visual">
                  <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"/></svg>
                  <span class="btn-text">无界视觉</span>
                </button>
              </div>
            </div>
            <!-- 手动设为首页按钮 (默认显示，识别后自动隐藏) -->
            <button class="set-homepage-btn" id="header-set-homepage-btn" title="将此页面设为浏览器主页/启动页">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              设为首页
            </button>
            <!-- 新建文件夹按钮 -->
            <button class="set-homepage-btn" id="add-folder-global-btn" title="新建文件夹" style="margin-left: 8px;">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
              <span id="txt-add-folder-btn">新建文件夹</span>
            </button>
          </div>
          <p class="subtitle" id="folder-stats">正在计算书签数量...</p>
        </div>
        
        <!-- 搜索框 -->
        <div class="search-box">
          <div class="search-engine-selector" id="search-engine-selector">
            <span class="engine-current-icon" id="engine-current-icon">📁</span>
            <span class="engine-arrow">▼</span>
            <div class="engine-dropdown" id="engine-dropdown">
              <!-- JS 动态渲染项 -->
            </div>
          </div>
          <input type="text" id="search-input" placeholder="搜索书签、链接或关键词...">
          <kbd class="shortcut-hint">/</kbd>
        </div>

        <div class="header-right">
          <!-- 背景壁纸设置控制面板 (新加) -->
          <div class="bg-settings-container">
            <button class="bg-settings-toggle" id="bg-settings-toggle" title="背景壁纸设置">
              <svg style="width:1.1em;height:1.1em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            
            <!-- 悬浮面板 -->
            <div class="bg-settings-panel" id="bg-settings-panel">
              <div class="panel-row">
                <label id="lbl-enable-bg">启用壁纸背景</label>
                <input type="checkbox" id="bg-enable-toggle">
              </div>
              <div class="panel-row">
                <label id="lbl-enable-slideshow">幻灯片播放</label>
                <input type="checkbox" id="bg-slideshow-toggle">
              </div>
              <div class="panel-row">
                <label id="lbl-bg-fit">展示效果</label>
                <select id="bg-fit-select">
                  <option value="cover" id="opt-fit-cover">拉伸填充</option>
                  <option value="contain" id="opt-fit-contain">适应缩放</option>
                  <option value="repeat" id="opt-fit-tile">复制平铺</option>
                </select>
              </div>
              <div class="panel-row">
                <label id="lbl-bg-opacity">壁纸清晰度</label>
                <div class="slider-wrapper">
                  <input type="range" id="bg-opacity-slider" min="0" max="100" value="70">
                  <span id="bg-opacity-val">70%</span>
                </div>
              </div>
              <div class="panel-row file-upload-row">
                <button class="upload-btn" id="bg-upload-trigger">上传图片 (最多6张)</button>
                <input type="file" id="bg-file-inputs" accept="image/*" multiple style="display: none;">
              </div>
              <div class="thumbs-grid" id="bg-thumbs-grid">
                <!-- 动态渲染缩略图 -->
              </div>
              <div class="panel-row" id="homepage-status-row" style="margin-top: 12px; border-top: 1px solid var(--border-color); padding-top: 12px; font-size: 0.8rem; flex-direction: column; align-items: flex-start; gap: 8px; width: 100%;">
                <div style="display: flex; align-items: center; gap: 6px; width: 100%; justify-content: space-between;">
                  <span style="color: var(--text-secondary);">主页模式状态:</span>
                  <span id="homepage-status-badge" style="font-weight: 500; display: flex; align-items: center; gap: 6px;">
                    <span id="homepage-status-dot" style="width: 8px; height: 8px; border-radius: 50%; background-color: #9ca3af; display: inline-block;"></span>
                    <span id="homepage-status-text" style="font-size: 0.75rem;">未检测到</span>
                  </span>
                </div>
                <button class="upload-btn" id="btn-homepage-reset" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); font-weight: 500; font-size: 0.72rem; padding: 4px 10px; width: 100%; display: none;">恢复显示顶部“设为首页”</button>
              </div>

            </div>
          </div>

          <!-- 语言选择下拉菜单 -->
          <div class="dropdown-container" id="lang-dropdown-container">
            <button class="dropdown-toggle-btn" id="lang-toggle-btn" title="切换语言">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </button>
            <div class="dropdown-menu-list" id="lang-dropdown-menu">
              <!-- JS 动态加载 -->
            </div>
          </div>

          <!-- 主题选择下拉菜单 -->
          <div class="dropdown-container" id="theme-dropdown-container">
            <button class="dropdown-toggle-btn" id="theme-toggle-btn" title="切换主题配色">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.52 22 22 17.52 22 12S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z"/><circle cx="7.5" cy="10.5" r="1.5"/><circle cx="11.5" cy="7.5" r="1.5"/><circle cx="16.5" cy="9.5" r="1.5"/><circle cx="15.5" cy="14.5" r="1.5"/></svg>
            </button>
            <div class="dropdown-menu-list" id="theme-dropdown-menu">
              <!-- JS 动态加载 -->
            </div>
          </div>
          <!-- 视图模式切换器 -->
          <div class="view-switcher" id="view-switcher">
            <button class="view-btn active" data-mode="card">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              <span class="btn-text">卡片</span>
            </button>
            <button class="view-btn" data-mode="list">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              <span class="btn-text">列表</span>
            </button>
            <button class="view-btn" data-mode="icon">
              <svg style="width:1.15em;height:1.15em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              <span class="btn-text">图标</span>
            </button>
          </div>
        </div>
      </header>

      <!-- 书签卡片展示区 -->
      <section class="cards-grid view-mode-card" id="cards-grid">
        <!-- 动态加载书签卡片 -->
      </section>
    </main>

    <!-- ================= 文件夹展开弹窗 Modal ================= -->
    <div class="folder-modal-overlay" id="folder-modal-overlay">
      <div class="folder-modal" id="folder-modal">
        <header class="modal-header">
          <div class="modal-title-area">
            <span class="modal-back-btn" id="modal-back-btn" style="display: none;" title="返回上一级">
              <svg style="width:1.1em;height:1.1em;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </span>
            <h3 id="modal-folder-title">文件夹内容</h3>
          </div>
          <button class="modal-close" id="modal-close" title="关闭弹窗">&times;</button>
        </header>
        <div class="modal-body-wrapper">
          <div class="cards-grid" id="modal-cards-grid">
            <!-- 动态加载文件夹内部的子文件夹或网页链接 -->
          </div>
        </div>
      </div>
    </div>
    <!-- 首次安装向导弹窗 -->
    <div class="folder-modal-overlay" id="onboarding-modal-overlay" style="z-index: 2000;">
      <div class="folder-modal" id="onboarding-modal" style="max-width: 460px; padding: 30px; text-align: center;">
        <h2 id="onboarding-title" style="margin-bottom: 12px; color: var(--accent-color); font-size: 1.35rem;">🎉 感谢安装书签视觉看板！</h2>
        <p id="onboarding-desc" style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; text-align: left;">
          本插件已就绪。为了符合你的浏览习惯，请选择是否将本看板作为你的<b>默认新标签页</b>？
        </p>
        <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
          <button class="upload-btn" id="btn-onboarding-keep" style="background: linear-gradient(135deg, var(--accent-color), #8b5cf6); color: white; font-weight: 600; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem;">🏠 是的，设置为首页</button>
          <button class="upload-btn" id="btn-onboarding-homepage" style="background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary); font-weight: 500; padding: 9px; border-radius: 8px; cursor: pointer; font-size: 0.82rem;">🎴 不，仅作为新标签页</button>
        </div>
      </div>
    </div>

  </div>
  <script src="dashboard.js"></script>
</body>
</html>
