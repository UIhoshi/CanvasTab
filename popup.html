<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CanvasTab: 浏览器书签</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏：显示文件夹目录 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-text">
          <svg style="width:1.15em;height:1.15em;vertical-align:middle;display:inline-flex;margin-right:8px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="8" x2="22" y2="12"/><line x1="12" y1="2" x2="22" y2="12"/><polyline points="12 2 20 10 12 18"/><line x1="6" y1="12" x2="12" y2="18"/><line x1="2" y1="22" x2="11" y2="13"/></svg>
          Bookmarks
        </span>
      </div>
      <nav class="folder-list" id="folder-list">
        <!-- 动态加载文件夹 -->
        <div class="loading-placeholder">加载文件夹中...</div>
      </nav>
    </aside>

    <!-- 主展示区 -->
    <main class="main-content">
      <header class="main-header">
        <h2 id="current-folder-title">所有书签</h2>
        <div class="search-box">
          <input type="text" id="search-input" placeholder="搜索书签或链接...">
          <kbd class="shortcut-hint">/</kbd>
        </div>
      </header>

      <!-- 书签卡片展示区 -->
      <section class="cards-grid" id="cards-grid">
        <!-- 动态加载书签卡片 -->
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
